name: Build

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  XMAKE_GLOBALDIR: ${{ github.workspace }}/.xmake-global
  XMAKE_PKG_CACHEDIR: ${{ github.workspace }}/.xmake-cache

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Hash deps
        id: hashes
        run: |
          $depsHash = (Get-FileHash -Algorithm SHA256 -Path xmake.lua).Hash.Substring(0, 16)
          echo "deps=$depsHash" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Restore xmake packages
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.XMAKE_GLOBALDIR }}
            ${{ env.XMAKE_PKG_CACHEDIR }}
            ${{ env.LOCALAPPDATA }}\.xmake
          key: pkgs-${{ steps.hashes.outputs.deps }}
          restore-keys: |
            pkgs-

      - name: Clean output
        run: |
          if (Test-Path "bin") {
            Write-Host "Found existing bin directory, listing contents:"
            Get-ChildItem -Recurse "bin" | ForEach-Object {
              Write-Host "  $($_.FullName) ($([math]::Round($_.Length / 1KB, 2)) KB, $($_.LastWriteTime))"
            }
            Remove-Item -Recurse -Force "bin"
            Write-Host "bin directory removed."
          } else {
            Write-Host "bin directory does not exist, nothing to clean."
          }
        shell: pwsh

      - name: Build
        run: |
          xmake f -a x64 -m release -p windows -y
          xmake -y -j $env:NUMBER_OF_PROCESSORS
        shell: pwsh

      - name: Save xmake packages
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            ${{ env.XMAKE_GLOBALDIR }}
            ${{ env.XMAKE_PKG_CACHEDIR }}
            ${{ env.LOCALAPPDATA }}\.xmake
          key: pkgs-${{ steps.hashes.outputs.deps }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-windows-x64-${{ github.run_number }}
          path: bin/
